services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root  # Required for bind mounts on Linux
    ports:
      - "8000:8000"
    volumes:
      - surrealdb:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always
    pull_policy: always
    networks:
      - dokploy-network

  open_notebook:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8502:8502"  # Web UI
      - "5055:5055"  # REST API
    expose:
      - 8502
      - 5055
    environment:
      # REQUIRED: Set via .env or secrets
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${OPEN_NOTEBOOK_ENCRYPTION_KEY}

      # Database connection
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook

      - API_URL=https://api.onb.skoris.com
    volumes:
      - open_notebook:/app/data
    depends_on:
      - surrealdb
    restart: always
    pull_policy: always
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.open_notebook.rule=Host(`onb.skoris.com`)"
      - "traefik.http.routers.open_notebook.entrypoints=websecure"
      - "traefik.http.routers.open_notebook.tls.certresolver=letsencrypt"
      - "traefik.http.routers.open_notebook.service=open_notebook"
      - "traefik.http.services.open_notebook.loadbalancer.server.port=8502"

      - "traefik.http.routers.open_notebook_api.rule=Host(`api.onb.skoris.com`)"
      - "traefik.http.routers.open_notebook_api.entrypoints=websecure"
      - "traefik.http.routers.open_notebook_api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.open_notebook_api.service=open_notebook_api"
      - "traefik.http.services.open_notebook_api.loadbalancer.server.port=5055"

networks:
  dokploy-network:
    external: true

volumes:
  surrealdb:
  open_notebook:
